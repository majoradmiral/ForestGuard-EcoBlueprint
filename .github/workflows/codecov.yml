name: codecov

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: forestguard
          POSTGRES_PASSWORD: forestguard
          POSTGRES_DB: forestguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forestguard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/pyproject.toml

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Install postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for Postgres to be ready
        run: |
          echo "Waiting for Postgres..."
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U forestguard && break
            sleep 1
          done
        env:
          PGPASSWORD: forestguard

      - name: "Debug: pytest collection"
        working-directory: ./backend
        run: pytest --collect-only -q

      - name: Run tests with coverage
        working-directory: ./backend
        run: pytest --cov=. --cov-report=xml --cov-report=term
        env:
          DATABASE_URL: postgresql+asyncpg://forestguard:forestguard@localhost:5432/forestguard

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          fail_ci_if_error: false
          verbose: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
